name: 지수 실시간 갱신

# 5분마다 주요지수 가격만 가볍게 갱신 (Claude API 호출 없음, 비용 0원)
# 전체 데이터(수급/AI분석 등)는 기존 "마켓 데이터 자동 갱신" 워크플로가
# 하루 4번(08/12/16/20시) 그대로 담당함

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 (GitHub Actions cron 최소 단위)
  workflow_dispatch:         # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update-indices:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요한 패키지 설치
        run: pip install yfinance curl_cffi

      - name: 지수 가격 갱신 스크립트 실행
        run: python fetch_indices_live.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indices_live.json
          git diff --quiet && git diff --staged --quiet || git commit -m "지수 실시간 갱신"
          git push
