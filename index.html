<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓 로테이션 데스크</title>
<style>
  @import url('https://cdnjs.cloudflare.com/ajax/libs/ibm-plex/6.4.1/css/ibm-plex.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap');

  :root{
    --bg:#0a0c11;
    --panel:#12151c;
    --panel-2:#161a22;
    --line:#242933;
    --line-soft:#1a1e27;
    --text:#e8eaed;
    --muted:#8b909c;
    --faint:#565b66;
    --up:#3ba88f;
    --up-dim:rgba(59,168,143,.13);
    --down:#c96a56;
    --down-dim:rgba(201,106,86,.14);
    --ai:#c99a4a;
    --ai-dim:rgba(201,154,74,.12);
    --watch:#6f9bd1;
    --watch-dim:rgba(111,155,209,.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; }
  .serif{ font-family:'Source Serif 4',serif; }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  a{ color:inherit; }

  .top-accent{ height:2px; background:linear-gradient(90deg, var(--up), var(--line) 35%, var(--ai) 65%, var(--down)); opacity:.55; }
  .masthead{ padding:26px 32px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px; }
  .masthead-eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.14em; color:var(--faint); margin-bottom:8px; text-transform:uppercase; }
  .masthead-title{ font-family:'Source Serif 4',serif; font-size:27px; font-weight:600; letter-spacing:-0.01em; }
  .masthead-title .accent-mark{ color:var(--ai); }
  .masthead-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:8px; }
  .masthead-meta{ text-align:right; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); line-height:1.8; }
  .status-pill{ display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border:1px solid var(--line); border-radius:20px; }
  .status-pill.ok{ color:var(--up); border-color:rgba(59,168,143,.35); }
  .status-pill.err{ color:var(--down); border-color:rgba(201,106,86,.35); }
  .status-pill .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

  .meta-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
  .btn{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:6px 12px; border-radius:4px; border:1px solid var(--line); background:var(--panel-2); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:6px; text-decoration:none; transition:border-color .15s ease, color .15s ease; }
  .btn:hover{ border-color:var(--muted); }
  .btn.primary{ border-color:rgba(59,168,143,.4); color:var(--up); }
  .btn.primary:hover{ border-color:var(--up); background:var(--up-dim); }
  .btn:disabled{ opacity:.5; cursor:default; }
  .btn .spin{ display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .legend{ display:flex; gap:22px; flex-wrap:wrap; padding:14px 32px; background:var(--panel); border-bottom:1px solid var(--line); font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); }
  .legend span{ display:inline-flex; align-items:center; gap:7px; }
  .legend .swatch{ width:9px; height:9px; border-radius:2px; }
  .legend .swatch.live{ background:var(--text); opacity:.7; }
  .legend .swatch.ai{ background:var(--ai); }

  .container{ padding:30px 32px 70px; max-width:1440px; margin:0 auto; }

  .section-label{ display:flex; align-items:baseline; gap:11px; margin:40px 0 14px; }
  .section-label:first-child{ margin-top:0; }
  .section-label .bar{ width:3px; height:15px; background:var(--ai); align-self:center; }
  .section-label h2{ font-family:'Source Serif 4',serif; font-size:16px; font-weight:600; }
  .section-label .note{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.04em; }

  .ai-tag{ display:inline-flex; align-items:center; gap:4px; font-family:'IBM Plex Mono',monospace; font-size:8.5px; letter-spacing:.08em; color:var(--ai); background:var(--ai-dim); border:1px solid rgba(201,154,74,.3); padding:1.5px 5px 1.5px 4px; border-radius:3px; text-transform:uppercase; white-space:nowrap; }
  .ai-tag::before{ content:"◆"; font-size:6px; }

  .index-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }

  .index-grid-main{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .index-card-wide{ grid-column: span 2; }
  .index-card{ background:var(--panel); padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
  .index-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .index-name{ font-family:'Source Serif 4',serif; font-size:17px; font-weight:600; }
  .index-price{ font-family:'IBM Plex Mono',monospace; font-size:21px; font-weight:600; text-align:right; letter-spacing:-.01em; }
  .index-chg{ font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:right; margin-top:3px; }
  .up{ color:var(--up); } .down{ color:var(--down); } .flat{ color:var(--muted); }

  .index-mid{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft); }
  .conf-block{ display:flex; align-items:center; gap:8px; }
  .conf-label{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--faint); }

  .dots{ display:inline-flex; gap:3px; }
  .dots .d{ width:6px; height:6px; border-radius:50%; border:1px solid var(--faint); }
  .dots .d.filled{ background:var(--ai); border-color:var(--ai); }

  .flow-badge{ font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 9px; border-radius:3px; white-space:nowrap; display:inline-block; font-weight:500; }
  .flow-in{ background:var(--up-dim); color:var(--up); }
  .flow-out{ background:var(--down-dim); color:var(--down); }
  .flow-flat{ background:rgba(139,144,156,.12); color:var(--muted); }

  .obv-badge{ font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 9px; border-radius:3px; white-space:nowrap; display:inline-block; font-weight:500; }
  .obv-badge.strong-buy{ background:var(--up-dim); color:var(--up); }
  .obv-badge.weak-buy{ background:rgba(59,168,143,.05); color:var(--up); opacity:.75; border:1px dashed rgba(59,168,143,.4); }
  .obv-badge.strong-sell{ background:var(--down-dim); color:var(--down); }
  .obv-badge.weak-sell{ background:rgba(201,106,86,.05); color:var(--down); opacity:.75; border:1px dashed rgba(201,106,86,.4); }
  .obv-badge.neutral{ background:rgba(139,144,156,.12); color:var(--muted); }

  .index-summary{ font-size:12px; color:var(--muted); line-height:1.6; display:flex; align-items:flex-start; gap:8px; }

  .sector-table-wrap{ border:1px solid var(--line); overflow-x:auto; background:var(--panel); }
  table.sector{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:1180px; table-layout:fixed; }
  table.sector thead th{ background:var(--panel-2); text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:.05em; color:var(--muted); padding:11px 16px; border-bottom:1px solid var(--line); white-space:nowrap; }
  table.sector thead th.ai-col{ color:var(--ai); }
  table.sector tbody td{ padding:14px 16px; border-bottom:1px solid var(--line-soft); border-right:1px solid var(--line-soft); vertical-align:top; }
  table.sector tbody td:last-child{ border-right:none; }
  table.sector thead th{ border-right:1px solid var(--line); }
  table.sector thead th:last-child{ border-right:none; }
  table.sector tbody tr:nth-child(even){ background:var(--panel-2); }
  table.sector tbody tr:hover{ background:#1c212b; }
  .sector-name{ font-family:'Source Serif 4',serif; font-weight:600; font-size:13.5px; }

  .momentum-cell{ display:flex; flex-direction:column; gap:5px; min-width:120px; }
  .momentum-label{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; }
  .momentum-track{ height:4px; background:var(--line); border-radius:2px; position:relative; overflow:visible; }
  .momentum-track::before{ content:""; position:absolute; left:50%; top:-2px; bottom:-2px; width:1px; background:var(--faint); }
  .momentum-fill{ position:absolute; top:0; bottom:0; border-radius:2px; }
  .momentum-fill.up{ background:var(--up); left:50%; }
  .momentum-fill.down{ background:var(--down); right:50%; }

  .cycle-tag{ font-size:11px; font-family:'IBM Plex Mono',monospace; }
  .cycle-tag.current{ color:var(--up); font-weight:600; }
  .cycle-tag.next{ color:var(--ai); }
  .cycle-tag.watch{ color:var(--watch); }
  .cycle-empty{ color:var(--faint); }

  .news-cell{ max-width:280px; font-size:12px; color:var(--text); line-height:1.55; }

  .calendar{ display:flex; flex-direction:column; border:1px solid var(--line); background:var(--panel); }
  .cal-row{ display:grid; grid-template-columns:104px 76px 1fr; gap:18px; padding:13px 20px; align-items:flex-start; border-bottom:1px solid var(--line-soft); font-size:12.5px; }
  .cal-row:last-child{ border-bottom:none; }
  .cal-date{ font-family:'IBM Plex Mono',monospace; color:var(--muted); font-size:11.5px; padding-top:2px; }
  .cal-tag{ font-family:'IBM Plex Mono',monospace; font-size:10px; padding:2px 8px; border-radius:3px; display:inline-block; font-weight:500; }
  .tag-favor{ background:var(--up-dim); color:var(--up); }
  .tag-caution{ background:var(--down-dim); color:var(--down); }
  .tag-neutral{ background:rgba(139,144,156,.12); color:var(--muted); }
  .cal-event{ color:var(--text); }
  .cal-meta{ display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--muted); margin-top:5px; }

  .footnote{ margin-top:30px; padding:18px 20px; border:1px solid var(--line); background:var(--panel); border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--faint); line-height:1.9; }
  .footnote strong{ color:var(--muted); }

  .flow-detail{ margin-top:2px; display:flex; flex-direction:column; gap:8px; }
  .flow-row{ display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; }
  .flow-row .label{ width:34px; color:var(--muted); flex-shrink:0; }
  .flow-row .bar-track{ flex:1; height:6px; background:var(--line); border-radius:3px; position:relative; }
  .flow-row .bar-track::before{ content:""; position:absolute; left:50%; top:-2px; bottom:-2px; width:1px; background:var(--faint); }
  .flow-row .bar-fill{ position:absolute; top:0; bottom:0; border-radius:3px; }
  .flow-row .bar-fill.buy{ background:var(--up); left:50%; }
  .flow-row .bar-fill.sell{ background:var(--down); right:50%; }
  .flow-row .val{ width:88px; text-align:right; flex-shrink:0; }
  .flow-trend{ font-size:11px; color:var(--muted); margin-top:6px; padding-top:8px; border-top:1px dashed var(--line-soft); }

  .trend-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); }
  .trend-card{ background:var(--panel); padding:18px 20px; display:flex; flex-direction:column; gap:10px; }
  .trend-title{ font-family:'Source Serif 4',serif; font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .trend-title::before{ content:"▲"; color:var(--ai); font-size:10px; }
  .trend-desc{ font-size:12.5px; color:var(--text); line-height:1.6; }
  .trend-sectors{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); }
  .trend-news-toggle{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ai); cursor:pointer; background:none; border:none; padding:0; text-align:left; margin-top:4px; }
  .trend-news-toggle:hover{ text-decoration:underline; }

  .news-trigger{ cursor:pointer; border-bottom:1px dotted var(--faint); text-decoration:none; }
  .news-trigger:hover{ border-bottom-color:var(--ai); color:var(--ai); }
  .news-more-toggle{
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint);
    background:none; border:none; cursor:pointer; padding:0 0 0 5px; vertical-align:baseline;
  }
  .news-more-toggle:hover{ color:var(--ai); }
  .cal-news{ margin-top:8px; }
  .news-dropdown{ display:none; margin-top:8px; padding:10px 12px; background:var(--panel-2); border:1px solid var(--line); border-radius:4px; font-size:11.5px; }
  .news-dropdown.open{ display:block; }
  .news-dropdown .news-item-plain{ display:block; color:var(--text); padding:5px 0; border-bottom:1px solid var(--line-soft); cursor:default; }
  .news-dropdown .news-item-plain:last-child{ border-bottom:none; }
  .news-dropdown .empty{ color:var(--faint); font-family:'IBM Plex Mono',monospace; font-size:10.5px; }

  .flow-wrap{ position:relative; display:inline-flex; }
  .flow-wrap.has-tip{ cursor:help; }
  .flow-wrap.has-tip .flow-badge{ border-bottom:1px dotted currentColor; }

  .flow-triad{
    display:inline-flex; align-items:center; gap:10px;
    border-bottom:1px dotted var(--faint); padding-bottom:2px;
  }
  .flow-tri{
    display:inline-flex; align-items:baseline; gap:3px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color:var(--faint);
  }
  .flow-tri .tri-arrow{ font-size:12px; font-weight:700; }
  .flow-tri.up{ color:var(--muted); }
  .flow-tri.up .tri-arrow{ color:var(--up); }
  .flow-tri.down{ color:var(--muted); }
  .flow-tri.down .tri-arrow{ color:var(--down); }
  .flow-tri.flat{ color:var(--faint); }
  .flow-tri.flat .tri-arrow{ color:var(--faint); }

  .flow-tooltip{
    position:absolute; top:calc(100% + 9px); left:0;
    min-width:230px; background:var(--panel-2); border:1px solid var(--line);
    border-radius:6px; padding:11px 13px; box-shadow:0 10px 28px rgba(0,0,0,.45);
    opacity:0; visibility:hidden; transform:translateY(3px);
    transition:opacity .13s ease, transform .13s ease;
    z-index:30; pointer-events:none;
  }
  .flow-wrap.has-tip:hover .flow-tooltip{ opacity:1; visibility:visible; transform:translateY(0); }
  .flow-tooltip::before{
    content:""; position:absolute; bottom:100%; left:14px;
    border:6px solid transparent; border-bottom-color:var(--line);
  }
  .flow-tooltip::after{
    content:""; position:absolute; bottom:100%; left:14px; margin-bottom:-1px;
    border:5px solid transparent; border-bottom-color:var(--panel-2);
  }
  .flow-tooltip .tip-header{
    font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.06em;
    color:var(--faint); text-transform:uppercase; margin-bottom:8px;
    padding-bottom:7px; border-bottom:1px solid var(--line-soft);
  }
  .flow-tooltip .tip-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:14px; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:3px 0;
  }
  .flow-tooltip .tip-row .who{ display:flex; align-items:center; gap:6px; color:var(--muted); }
  .flow-tooltip .tip-row .who::before{
    content:""; width:6px; height:6px; border-radius:50%; background:var(--faint); flex-shrink:0;
  }
  .flow-tooltip .tip-row.buy .who::before{ background:var(--up); }
  .flow-tooltip .tip-row.sell .who::before{ background:var(--down); }
  .flow-tooltip .tip-row .amt.up{ color:var(--up); font-weight:600; }
  .flow-tooltip .tip-row .amt.down{ color:var(--down); font-weight:600; }

  .mini-chart{ display:flex; flex-direction:column; gap:6px; }
  .mini-chart-row{ display:flex; align-items:center; gap:8px; }
  .mini-chart-row .who-label{
    width:28px; flex-shrink:0; font-family:'IBM Plex Mono',monospace;
    font-size:9px; color:var(--muted);
  }
  .mini-bars{ display:flex; align-items:center; gap:3px; height:26px; }
  .mini-bar-col{ position:relative; width:10px; height:26px; cursor:default; }
  .mini-bar-col::before{
    content:""; position:absolute; left:0; right:0; top:50%;
    height:1px; background:var(--line-soft);
  }
  .mini-bar-fill{ position:absolute; left:1px; right:1px; border-radius:1px; min-height:1px; }
  .mini-bar-fill.up{ background:var(--up); bottom:50%; }
  .mini-bar-fill.down{ background:var(--down); top:50%; }
  .mini-bar-col.today .mini-bar-fill{ opacity:1; }
  .mini-bar-col:not(.today) .mini-bar-fill{ opacity:.55; }
  .mini-chart-range{
    font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:var(--faint);
    text-align:right; margin-top:1px;
  }
  .flow-tooltip .tip-summary{
    margin-top:8px; padding-top:8px; border-top:1px dashed var(--line-soft);
    font-family:'IBM Plex Sans',sans-serif; font-size:11px; color:var(--text); line-height:1.55;
  }
  .flow-tooltip .tip-date{
    margin-top:6px; font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--faint);
  }

  .ranking-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .ranking-col{ background:var(--panel); padding:18px 20px; display:flex; flex-direction:column; gap:4px; }
  .ranking-col-title{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em; color:var(--muted);
    text-transform:uppercase; padding-bottom:12px; margin-bottom:6px; border-bottom:1px solid var(--line-soft);
    display:flex; align-items:center; gap:6px;
  }
  .ranking-item{
    display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-soft);
  }
  .ranking-item:last-child{ border-bottom:none; }
  .ranking-item.compact{ padding:6px 0; }
  .ranking-sub-label{
    font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.05em; color:var(--faint);
    text-transform:uppercase; margin:4px 0 2px;
  }
  .ranking-sub-label.sell{ margin-top:10px; padding-top:8px; border-top:1px dashed var(--line-soft); }
  .ranking-rank{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:700; color:var(--faint);
    width:16px; flex-shrink:0;
  }
  .ranking-sublist .ranking-item:first-child .ranking-rank{ color:var(--ai); }
  .ranking-info{ flex:1; min-width:0; }
  .ranking-name-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ranking-name{ font-family:'Source Serif 4',serif; font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; }
  .ranking-sublist{ min-height:212px; }
  .ranking-bar-track{ height:3px; background:var(--line); border-radius:2px; margin-top:5px; overflow:hidden; }
  .ranking-bar-fill{ height:100%; background:var(--up); border-radius:2px; }
  .ranking-bar-fill.sell{ background:var(--down); }
  .ranking-figures{ text-align:right; flex-shrink:0; }
  .ranking-amount{ font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; color:var(--up); }
  .ranking-amount.down{ color:var(--down); }
  .ranking-growth{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; margin-top:2px; }
  .ranking-growth.up{ color:var(--up); }
  .ranking-growth.down{ color:var(--down); }
  .ranking-growth.flat{ color:var(--faint); }
  .ranking-empty{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--faint); padding:10px 0; }

  .ranking-badges{ display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
  .rank-badge{
    font-family:'IBM Plex Mono',monospace; font-size:9px; padding:1.5px 6px; border-radius:3px;
    display:inline-flex; align-items:center; gap:3px; font-weight:600; white-space:nowrap;
  }
  .rank-badge .rank-badge-sub{ font-weight:400; opacity:.8; }
  .rank-badge.new{ background:var(--ai-dim); color:var(--ai); }
  .rank-badge.up{ background:var(--up-dim); color:var(--up); }
  .rank-badge.down{ background:var(--down-dim); color:var(--down); }
  .rank-badge.flat{ background:rgba(139,144,156,.12); color:var(--muted); font-weight:400; }
  .rank-badge.streak{ background:var(--watch-dim); color:var(--watch); }

  .loading, .error{ padding:80px 20px; text-align:center; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .error{ color:var(--down); }

  @media (max-width:1000px){
    .index-row{ grid-template-columns:1fr; }
    .index-grid-main{ grid-template-columns:1fr; }
    .index-card-wide{ grid-column: span 1; }
    .ranking-grid{ grid-template-columns:1fr; }
    .cal-row{ grid-template-columns:76px 62px 1fr; }
    .masthead{ padding:20px; } .container{ padding:20px 20px 50px; } .legend{ padding:12px 20px; }
  }
</style>
</head>
<body>

<div class="top-accent"></div>

<div class="masthead">
  <div>
    <div class="masthead-eyebrow">Sector Rotation & Capital Flow Monitor</div>
    <div class="masthead-title">마켓 로테이션 데스크 <span class="accent-mark">·</span> 리서치 노트</div>
    <div class="masthead-sub">KR / US 지수·섹터 실시간 시세 + AI 리서치 코멘터리</div>
  </div>
  <div class="masthead-meta">
    <div><span class="status-pill" id="statusPill"><span class="dot"></span><span id="liveStatus">불러오는 중</span></span></div>
    <div id="updatedAt">-</div>
    <div class="meta-actions">
      <button class="btn" id="refreshBtn" onclick="loadDashboard(true)">⟳ 화면 새로고침</button>
      <a class="btn primary" id="runActionBtn" href="#" target="_blank" rel="noopener">▷ 재분석 실행하기</a>
    </div>
  </div>
</div>

<div class="legend">
  <span><span class="swatch live"></span>가격 · 거래량 · 모멘텀(후행지표) — 실시간 시세 기반 계산값</span>
  <span><span class="swatch live"></span>수급(개인/기관/외국인, 선행지표) — 한국거래소(KRX) 실데이터, 뱃지에 마우스를 올리면 상세 표시</span>
  <span><span class="swatch ai"></span>싸이클 · 신뢰도 · 뉴스요약 — Claude AI 추정 (참고용)</span>
</div>

<div class="container" id="container">
  <div class="loading">data.json 불러오는 중...</div>
</div>

<script>
function dots(count, max){
  let html = '<span class="dots">';
  for(let i=0;i<max;i++){
    html += `<span class="d ${i<count ? 'filled' : ''}"></span>`;
  }
  html += '</span>';
  return html;
}

function flowBadgeHtml(flow){
  if(flow === '자금 유입') return `<span class="flow-badge flow-in">자금 유입</span>`;
  if(flow === '자금 유출') return `<span class="flow-badge flow-out">자금 유출</span>`;
  return `<span class="flow-badge flow-flat">중립</span>`;
}

function cycleTag(cycle){
  if(cycle === '현재 싸이클') return `<span class="cycle-tag current">● 현재 싸이클</span>`;
  if(cycle === '차기 싸이클 가능성') return `<span class="cycle-tag next">차기 싸이클 가능성</span>`;
  if(cycle === '관찰 대상') return `<span class="cycle-tag watch">◐ 관찰 대상</span>`;
  return `<span class="cycle-empty">—</span>`;
}

function obvBadgeHtml(label){
  const map = {
    '매수세 강': 'strong-buy',
    '매수세 약': 'weak-buy',
    '매도세 강': 'strong-sell',
    '매도세 약': 'weak-sell',
  };
  const cls = map[label] || 'neutral';
  return `<span class="obv-badge ${cls}">${label || '판단 보류'}</span>`;
}

function momentumCellContent(m){
  const label = m != null ? (m > 2 ? '강세' : m < -2 ? '약세' : '중립') : '중립';
  const cls = m > 2 ? 'up' : m < -2 ? 'down' : 'flat';
  return `
    <span class="momentum-label ${cls}">${label} ${m != null ? '('+m.toFixed(1)+'%)' : ''}</span>
    ${momentumBar(m)}
  `;
}

function momentumBar(m){
  const val = (m == null) ? 0 : m;
  const clamped = Math.max(-15, Math.min(15, val));
  const pct = Math.abs(clamped) / 15 * 50;
  const cls = clamped >= 0 ? 'up' : 'down';
  return `<div class="momentum-track"><div class="momentum-fill ${cls}" style="width:${pct}%"></div></div>`;
}

function pctColorClass(v){ return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }

function escapeHtml(str){
  if(str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtEok(val){
  const eok = val / 100000000;
  const sign = eok >= 0 ? '+' : '';
  return `${sign}${eok.toFixed(0)}억`;
}

let uidCounter = 0;
function nextUid(){ return 'news-' + (uidCounter++); }

function renderInvestorFlow(flow){
  if(!flow) return '';
  const maxAbs = Math.max(Math.abs(flow.individual), Math.abs(flow.institution), Math.abs(flow.foreign), 1);
  const bar = (val) => {
    const pct = Math.min(Math.abs(val) / maxAbs, 1) * 50;
    const cls = val >= 0 ? 'buy' : 'sell';
    return `<div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
  };
  return `
    <div class="flow-detail">
      <div class="flow-row"><span class="label">개인</span>${bar(flow.individual)}<span class="val ${flow.individual>=0?'up':'down'}">${fmtEok(flow.individual)}</span></div>
      <div class="flow-row"><span class="label">기관</span>${bar(flow.institution)}<span class="val ${flow.institution>=0?'up':'down'}">${fmtEok(flow.institution)}</span></div>
      <div class="flow-row"><span class="label">외국인</span>${bar(flow.foreign)}<span class="val ${flow.foreign>=0?'up':'down'}">${fmtEok(flow.foreign)}</span></div>
      <div class="flow-trend">${flow.trend_summary || ''} <span class="mono" style="color:var(--faint)">(${flow.date || ''} 기준)</span></div>
    </div>
  `;
}

function investorMiniChart(recent5Days){
  if(!recent5Days || !recent5Days.length) return '';
  const keys = [
    { key: 'individual', label: '개인' },
    { key: 'institution', label: '기관' },
    { key: 'foreign', label: '외국인' },
  ];
  const maxAbs = Math.max(
    1,
    ...recent5Days.flatMap(d => keys.map(k => Math.abs(d[k.key] || 0)))
  );
  const lastIdx = recent5Days.length - 1;

  const rows = keys.map(k => {
    const bars = recent5Days.map((d, i) => {
      const val = d[k.key] || 0;
      const fraction = Math.min(Math.abs(val) / maxAbs, 1);
      const heightPct = (fraction * 50).toFixed(1);
      const dir = val >= 0 ? 'up' : 'down';
      const todayCls = i === lastIdx ? ' today' : '';
      const title = `${d.date} · ${k.label} ${val >= 0 ? '순매수' : '순매도'} ${fmtEok(Math.abs(val))}`;
      return `<span class="mini-bar-col${todayCls}" title="${title}"><span class="mini-bar-fill ${dir}" style="height:${heightPct}%"></span></span>`;
    }).join('');
    return `<div class="mini-chart-row"><span class="who-label">${k.label}</span><span class="mini-bars">${bars}</span></div>`;
  }).join('');

  const range = `${recent5Days[0].date} ~ ${recent5Days[lastIdx].date}`;
  return `<div class="mini-chart">${rows}<div class="mini-chart-range">${range} (최근일 진하게)</div></div>`;
}

function buildFlowTriad(iv){
  const items = [
    { name: '개인', trend: iv.individual_trend },
    { name: '기관', trend: iv.institution_trend },
    { name: '외인', trend: iv.foreign_trend },
  ];
  const tags = items.map(it => {
    const symbol = it.trend === '순매수 우위' ? '▲' : it.trend === '순매도 우위' ? '▼' : '–';
    const cls = it.trend === '순매수 우위' ? 'up' : it.trend === '순매도 우위' ? 'down' : 'flat';
    return `<span class="flow-tri ${cls}">${it.name}<span class="tri-arrow">${symbol}</span></span>`;
  }).join('');
  return `<span class="flow-triad">${tags}</span>`;
}

function flowBadgeWithTooltip(item){
  const iv = item.investor_flow;
  if(iv && iv.trend_summary){
    const triad = buildFlowTriad(iv);
    const chart = iv.recent5_days && iv.recent5_days.length
      ? investorMiniChart(iv.recent5_days)
      : (() => {
          const tipRow = (label2, val) => {
            const dir = val >= 0 ? 'buy' : 'sell';
            const cls2 = val >= 0 ? 'up' : 'down';
            return `<div class="tip-row ${dir}"><span class="who">${label2}</span><span class="amt ${cls2}">${fmtEok(val)}</span></div>`;
          };
          return tipRow('개인', iv.individual) + tipRow('기관', iv.institution) + tipRow('외국인', iv.foreign);
        })();

    return `
      <span class="flow-wrap has-tip">
        ${triad}
        <span class="flow-tooltip">
          <div class="tip-header">최근 5거래일 순매수/순매도</div>
          ${chart}
          <div class="tip-summary">${escapeHtml(iv.trend_summary)}</div>
          <div class="tip-date">${iv.date || ''} 기준</div>
        </span>
      </span>
    `;
  }

  const isKrSectorFetchFail = item.group === '한국 섹터' && item.flow_basis && item.flow_basis.indexOf('모멘텀') !== -1;
  if(isKrSectorFetchFail){
    return `
      <span class="flow-wrap has-tip">
        <span class="flow-badge flow-flat" style="border-bottom:1px dotted currentColor;">수급 조회 실패</span>
        <span class="flow-tooltip">
          <div class="tip-header">데이터 안내</div>
          <div class="tip-summary">이번 실행에서 KRX 수급 데이터를 가져오지 못했습니다(일시적 오류). 실제 자금흐름이 중립이라는 뜻이 아니며, 하루 4회 자동 갱신 중 다음 실행 때 다시 시도됩니다.</div>
        </span>
      </span>
    `;
  }

  return `<span class="flow-wrap">${flowBadgeHtml(item.flow)}</span>`;
}

function newsDropdown(headlines, uid){
  const list = (headlines || []);
  const items = list.length
    ? list.map(h => `<span class="news-item-plain">${escapeHtml(h.title)}</span>`).join('')
    : `<div class="empty">관련 뉴스 원문이 없습니다.</div>`;
  return `<div class="news-dropdown" id="${uid}">${items}</div>`;
}

function newsSummaryHtml(item, uid){
  const summary = escapeHtml(item.news_summary) || '분석 정보 없음';
  return `<span class="news-trigger" onclick="toggleNews('${uid}')">${summary} ▾</span>${newsDropdown(item.headlines, uid)}`;
}

function toggleNews(uid){
  const el = document.getElementById(uid);
  if(el) el.classList.toggle('open');
}

function renderIndexCard(item, wide){
  if(item.error){
    return `
      <div class="index-card${wide ? ' index-card-wide' : ''}">
        <div class="index-top"><div class="index-name">${item.name}</div></div>
        <div class="index-summary" style="color:var(--faint);">⚠ 이번 실행에서 가격 데이터를 가져오지 못했습니다 (일시적 오류) · 다음 자동 갱신 때 재시도됩니다</div>
      </div>
    `;
  }
  const chgClass = pctColorClass(item.pct_change ?? 0);
  const arrow = (item.change ?? 0) >= 0 ? '▲' : '▼';
  const uid = nextUid();
  const wideCls = wide ? ' index-card-wide' : '';
  const summary = escapeHtml(item.news_summary) || '분석 정보 없음';
  return `
    <div class="index-card${wideCls}" data-index-name="${escapeHtml(item.name)}">
      <div class="index-top">
        <div class="index-name">${item.name}</div>
        <div>
          <div class="index-price" data-live-price>${item.price != null ? item.price.toLocaleString() : '-'}</div>
          <div class="index-chg ${chgClass}" data-live-chg>${arrow} ${Math.abs(item.change ?? 0).toFixed(2)} (${(item.pct_change ?? 0) >= 0 ? '+' : ''}${item.pct_change ?? 0}%)</div>
        </div>
      </div>
      ${item.investor_flow ? renderInvestorFlow(item.investor_flow) : ''}
      <div class="index-mid">
        ${flowBadgeHtml(item.flow)}
        <div class="conf-block">
          <span class="conf-label">AI 신뢰도</span>
          ${dots(item.confidence||0,5)}
        </div>
      </div>
      <div class="index-summary">
        <span class="ai-tag">AI</span>
        <span class="news-trigger" onclick="toggleNews('${uid}')">${summary} ▾</span>
      </div>
      ${newsDropdown(item.headlines, uid)}
    </div>
  `;
}

function renderSectorRow(item){
  if(item.error){
    return `
      <tr>
        <td class="sector-name">${item.name}</td>
        <td colspan="5" class="news-cell" style="color:var(--faint);">
          ⚠ 이번 실행에서 가격·수급 데이터를 가져오지 못했습니다 (일시적 오류) · 다음 자동 갱신 때 재시도됩니다
        </td>
      </tr>
    `;
  }
  const label = item.momentum_20d != null
    ? (item.momentum_20d > 2 ? '강세' : item.momentum_20d < -2 ? '약세' : '중립')
    : '중립';
  const labelClass = item.momentum_20d > 2 ? 'up' : item.momentum_20d < -2 ? 'down' : 'flat';
  const uid = nextUid();
  return `
    <tr>
      <td class="sector-name">${item.name}</td>
      <td>${flowBadgeWithTooltip(item)}</td>
      <td>${cycleTag(item.cycle)}</td>
      <td class="momentum-cell">
        <span class="momentum-label ${labelClass}">${label} ${item.momentum_20d != null ? '('+item.momentum_20d.toFixed(1)+'%)' : ''}</span>
        ${momentumBar(item.momentum_20d)}
      </td>
      <td>${dots(item.confidence||0,5)}</td>
      <td class="news-cell">
        ${newsSummaryHtml(item, uid)}
      </td>
    </tr>
  `;
}

function renderUsSectorRow(item){
  if(item.error){
    return `
      <tr>
        <td class="sector-name">${item.name}</td>
        <td colspan="3" class="news-cell" style="color:var(--faint);">
          ⚠ 이번 실행에서 가격 데이터를 가져오지 못했습니다 (일시적 오류) · 다음 자동 갱신 때 재시도됩니다
        </td>
      </tr>
    `;
  }
  const uid = nextUid();
  return `
    <tr>
      <td class="sector-name">${item.name}</td>
      <td>${obvBadgeHtml(item.obv_signal)}</td>
      <td class="momentum-cell">${momentumCellContent(item.momentum_20d)}</td>
      <td class="news-cell">
        ${newsSummaryHtml(item, uid)}
      </td>
    </tr>
  `;
}

function rankChangeBadge(row){
  if(row.is_new_entry){
    return `<span class="rank-badge new">신규진입</span>`;
  }
  if(row.last_week_rank == null){
    return '';
  }
  const diff = row.last_week_rank - row.rank;
  if(diff > 0) return `<span class="rank-badge up">▲${diff} <span class="rank-badge-sub">(전주 ${row.last_week_rank}위)</span></span>`;
  if(diff < 0) return `<span class="rank-badge down">▼${Math.abs(diff)} <span class="rank-badge-sub">(전주 ${row.last_week_rank}위)</span></span>`;
  return `<span class="rank-badge flat">– <span class="rank-badge-sub">(전주 동일)</span></span>`;
}

function rankingSubList(rows, mode){
  if(!rows || !rows.length){
    return `<div class="ranking-empty">${mode === 'buy' ? '순매수 상위 없음' : '순매도 상위 없음'}</div>`;
  }
  const maxAbs = Math.max(...rows.map(r => Math.abs(r.net_buy)), 1);
  const barCls = mode === 'sell' ? 'sell' : 'buy';
  const amountCls = mode === 'sell' ? 'down' : 'up';
  return rows.map(r => {
    const pct = Math.min(Math.abs(r.net_buy) / maxAbs, 1) * 100;
    return `
      <div class="ranking-item compact">
        <span class="ranking-rank">${r.rank}</span>
        <div class="ranking-info">
          <div class="ranking-name-row">
            <span class="ranking-name">${escapeHtml(r.name)}</span>
            ${rankChangeBadge(r)}
          </div>
          <div class="ranking-bar-track"><div class="ranking-bar-fill ${barCls}" style="width:${pct}%"></div></div>
        </div>
        <div class="ranking-figures">
          <div class="ranking-amount ${amountCls}">${fmtEok(r.net_buy)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderRankingComboCol(title, buyRows, sellRows){
  return `
    <div class="ranking-col">
      <div class="ranking-col-title">${title}</div>
      <div class="ranking-sub-label buy">▲ 매수 TOP 5</div>
      <div class="ranking-sublist">${rankingSubList((buyRows || []).slice(0, 5), 'buy')}</div>
      <div class="ranking-sub-label sell">▼ 매도 TOP 5</div>
      <div class="ranking-sublist">${rankingSubList((sellRows || []).slice(0, 5), 'sell')}</div>
    </div>
  `;
}

function renderRankingCol(title, rows, mode){
  mode = mode || 'buy';
  if(!rows || !rows.length){
    return `
      <div class="ranking-col">
        <div class="ranking-col-title">${title}</div>
        <div class="ranking-empty">${mode === 'buy' ? '이번 주 순매수 상위 종목 없음' : '이번 주 순매도 상위 종목 없음'}</div>
      </div>
    `;
  }
  const maxAbs = Math.max(...rows.map(r => Math.abs(r.net_buy)), 1);
  const barCls = mode === 'sell' ? 'sell' : 'buy';
  const amountCls = mode === 'sell' ? 'down' : 'up';
  const streakLabel = mode === 'sell' ? '주째 매도상위' : '주째 TOP5';
  const items = rows.map(r => {
    const pct = Math.min(Math.abs(r.net_buy) / maxAbs, 1) * 100;
    const growthCls = r.growth_pct == null ? 'flat' : r.growth_pct > 0 ? 'up' : r.growth_pct < 0 ? 'down' : 'flat';
    const growthText = r.growth_pct == null ? '전주 비교불가' : `전주대비 ${r.growth_pct > 0 ? '+' : ''}${r.growth_pct}%`;
    const streakBadge = r.weeks_in_top5 >= 2 ? `<span class="rank-badge streak">${r.weeks_in_top5}${streakLabel}</span>` : '';
    return `
      <div class="ranking-item">
        <span class="ranking-rank">${r.rank}</span>
        <div class="ranking-info">
          <div class="ranking-name">${escapeHtml(r.name)}</div>
          <div class="ranking-bar-track"><div class="ranking-bar-fill ${barCls}" style="width:${pct}%"></div></div>
          <div class="ranking-badges">${rankChangeBadge(r)}${streakBadge}</div>
        </div>
        <div class="ranking-figures">
          <div class="ranking-amount ${amountCls}">${fmtEok(r.net_buy)}</div>
          <div class="ranking-growth ${growthCls}">${growthText}</div>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="ranking-col">
      <div class="ranking-col-title">${title}</div>
      ${items}
    </div>
  `;
}

function renderMegatrendCard(trend){
  const uid = nextUid();
  return `
    <div class="trend-card">
      <div class="trend-title">${escapeHtml(trend.trend) || '트렌드'}</div>
      <div class="trend-desc">${escapeHtml(trend.description)}</div>
      <div class="trend-sectors">관련 섹터: ${escapeHtml(trend.related_sectors) || '-'}</div>
      <button class="trend-news-toggle" onclick="toggleNews('${uid}')">근거 뉴스 보기 ▾</button>
      ${newsDropdown(trend.source_headlines, uid)}
    </div>
  `;
}

function renderNewEtfCard(launch){
  const uid = nextUid();
  return `
    <div class="trend-card">
      <div class="trend-title">${escapeHtml(launch.etf_name) || 'ETF'}${launch.ticker ? ` <span class="mono" style="font-size:11px;color:var(--faint);">(${escapeHtml(launch.ticker)})</span>` : ''}</div>
      <div class="trend-desc">${escapeHtml(launch.summary)}</div>
      <div class="trend-sectors">운용사: ${escapeHtml(launch.issuer) || '-'} · 테마: ${escapeHtml(launch.theme) || '-'}</div>
      <button class="trend-news-toggle" onclick="toggleNews('${uid}')">근거 뉴스 보기 ▾</button>
      ${newsDropdown(launch.source_headlines, uid)}
    </div>
  `;
}

function renderThematicCard(label, holdings){
  if(!holdings || !holdings.length){
    return `<div class="ranking-col"><div class="ranking-col-title">${escapeHtml(label)}</div><div class="ranking-empty">데이터 없음</div></div>`;
  }
  const maxWeight = Math.max(...holdings.map(h => h.weight_pct), 1);
  const items = holdings.map((h, i) => {
    const pct = (h.weight_pct / maxWeight) * 100;
    const newBadge = h.is_new_entry ? `<span class="rank-badge new">신규편입</span>` : '';
    return `
      <div class="ranking-item compact">
        <span class="ranking-rank">${i+1}</span>
        <div class="ranking-info">
          <div class="ranking-name-row">
            <span class="ranking-name" style="max-width:160px;">${escapeHtml(h.name)}</span>
            <span class="mono" style="font-size:10px;color:var(--faint);">${escapeHtml(h.ticker)}</span>
            ${newBadge}
          </div>
          <div class="ranking-bar-track"><div class="ranking-bar-fill" style="width:${pct}%; background:var(--ai);"></div></div>
        </div>
        <div class="ranking-figures">
          <div class="ranking-amount" style="color:var(--ai);">${h.weight_pct}%</div>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="ranking-col">
      <div class="ranking-col-title">${escapeHtml(label)}</div>
      ${items}
    </div>
  `;
}

function renderCalendarRow(item){
  const tagClass = item.impact === '호재' ? 'tag-favor' : item.impact === '악재' ? 'tag-caution' : 'tag-neutral';
  const uid = nextUid();
  return `
    <div class="cal-row">
      <div class="cal-date">${item.date}</div>
      <div><span class="cal-tag ${tagClass}">${item.impact || '중립'}</span></div>
      <div>
        <div class="cal-event">${escapeHtml(item.event)}</div>
        <div class="cal-meta">
          <span class="ai-tag">AI</span>
          <span>${escapeHtml(item.comment)}${item.affected_sectors ? ' · 영향섹터 '+escapeHtml(item.affected_sectors) : ''}</span>
        </div>
        ${(item.headlines && item.headlines.length) ? `
        <div class="cal-news">
          <button class="trend-news-toggle" onclick="toggleNews('${uid}')">관련 뉴스 보기 ▾</button>
          ${newsDropdown(item.headlines, uid)}
        </div>` : ''}
      </div>
    </div>
  `;
}

async function loadDashboard(isManualRefresh){
  const container = document.getElementById('container');
  const pill = document.getElementById('statusPill');
  const refreshBtn = document.getElementById('refreshBtn');

  if(isManualRefresh){
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = '<span class="spin">⟳</span> 새로고침 중...';
  }

  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('data.json을 불러올 수 없습니다 (상태 코드 ' + res.status + ')');
    const data = await res.json();

    pill.classList.remove('err'); pill.classList.add('ok');
    document.getElementById('liveStatus').textContent = '데이터 연결됨';
    document.getElementById('updatedAt').textContent = '최근 갱신 · ' + new Date(data.updated_at).toLocaleString('ko-KR');

    const allIndexCards = (data.indices || [])
      .map(item => renderIndexCard(item, !!item.investor_flow))
      .join('');
    const trendCards = (data.megatrends || []).map(renderMegatrendCard).join('');
    const krRows = (data.kr_sectors || []).map(renderSectorRow).join('');
    const usRows = (data.us_sectors || []).map(renderUsSectorRow).join('');
    const calRows = (data.calendar || []).map(renderCalendarRow).join('');
    const thematicCards = Object.entries(data.thematic_holdings || {})
      .map(([label, holdings]) => renderThematicCard(label, holdings)).join('');
    const newEtfCards = (data.new_etf_launches || []).map(renderNewEtfCard).join('');

    container.innerHTML = `
      <div class="section-label"><div class="bar"></div><h2>주요지수</h2><span class="note">MAJOR INDICES</span></div>
      <div class="index-grid-main">${allIndexCards}</div>

      <div class="section-label"><div class="bar"></div><h2>최근 5영업일 섹터 대표주 매수·매도 랭킹</h2><span class="note">5-DAY SECTOR FLOW RANKING · 한국 섹터별 대표주 5개 기준 (ETF 수급 제외) · 투자자 유형별 매수/매도 상위 5종목</span></div>
      <div class="ranking-grid">
        ${renderRankingComboCol('개인', data.ranking && data.ranking.buy && data.ranking.buy.individual, data.ranking && data.ranking.sell && data.ranking.sell.individual)}
        ${renderRankingComboCol('기관', data.ranking && data.ranking.buy && data.ranking.buy.institution, data.ranking && data.ranking.sell && data.ranking.sell.institution)}
        ${renderRankingComboCol('외국인', data.ranking && data.ranking.buy && data.ranking.buy.foreign, data.ranking && data.ranking.sell && data.ranking.sell.foreign)}
      </div>

      ${trendCards ? `
      <div class="section-label"><div class="bar"></div><h2>메가트렌드 / 수급 뉴스</h2><span class="note">EMERGING TRENDS — AI 추정</span></div>
      <div class="trend-grid">${trendCards}</div>
      ` : ''}

      <div class="section-label"><div class="bar"></div><h2>한국 섹터</h2><span class="note">KR SECTOR FLOW · ${(data.kr_sectors||[]).length}개 종목 · 자금흐름 기준: 외국인 수급(선행지표) · 뱃지에 마우스오버 시 상세</span></div>
      <div class="sector-table-wrap">
        <table class="sector">
          <colgroup>
            <col style="width:16%"><col style="width:16%"><col style="width:14%">
            <col style="width:18%"><col style="width:10%"><col style="width:26%">
          </colgroup>
          <thead><tr>
            <th>섹터</th><th>5영업일 수급흐름</th><th>차기싸이클 예측 (규칙기반)</th><th>20일 모멘텀 (후행지표)</th><th class="ai-col">AI 신뢰도</th><th class="ai-col">AI 뉴스요약</th>
          </tr></thead>
          <tbody>${krRows}</tbody>
        </table>
      </div>

      <div class="section-label"><div class="bar"></div><h2>미국 섹터</h2><span class="note">US SECTOR FLOW · ${(data.us_sectors||[]).length}개 종목 · OBV(거래량 누적) 기반 매수/매도세 판정 · 참고용, 싸이클 예측 제외</span></div>
      <div class="sector-table-wrap">
        <table class="sector">
          <colgroup>
            <col style="width:20%"><col style="width:16%">
            <col style="width:20%"><col style="width:44%">
          </colgroup>
          <thead><tr>
            <th>섹터</th><th>OBV 매수/매도세</th><th>20일 모멘텀</th><th class="ai-col">AI 뉴스요약</th>
          </tr></thead>
          <tbody>${usRows}</tbody>
        </table>
      </div>

      <div class="section-label"><div class="bar"></div><h2>테마별 대표 종목</h2><span class="note">THEMATIC LEADERS · VanEck 테마 ETF 상위 10종목 · 반기 리밸런싱 · 참고용 (AI 분석·매매신호 아님)</span></div>
      <div class="ranking-grid" style="grid-template-columns:repeat(2,1fr);">${thematicCards}</div>

      ${newEtfCards ? `
      <div class="section-label"><div class="bar"></div><h2>신규 테마 ETF 출시 동향</h2><span class="note">NEW ETF LAUNCHES · 미국 자산운용사 신규 테마 ETF 출시/신청 소식 · AI 추정</span></div>
      <div class="trend-grid">${newEtfCards}</div>
      ` : ''}

      <div class="section-label"><div class="bar"></div><h2>이달 주요일정</h2><span class="note">EVENT CALENDAR</span></div>
      <div class="calendar">${calRows}</div>

      <div class="footnote">
        <strong>데이터 출처.</strong> 가격·거래량·모멘텀은 실시간 시세(지연 가능)를 기반으로 규칙에 따라 자동 계산됩니다.
        한국 섹터의 자금흐름은 한국거래소(KRX) 개인/기관/외국인 순매수 실데이터(선행지표)를 기준으로 판정합니다.
        <strong>이번 주 매수세 랭킹</strong>은 섹터 ETF가 아니라, 각 섹터를 대표하는 종목 5개(시가총액 상위 위주)의
        실제 수급만 합산한 근사치입니다(ETF 수급은 랭킹에서 제외). KRX가 "업종 전체" 수급을 한 번에 제공하는 기능이 없어 나온 절충 방식이며,
        섹터 내 모든 종목의 완전한 합산은 아닙니다.
        미국 섹터는 KRX 같은 독립적인 수급 데이터가 없어 자금흐름·싸이클 판정을 제공하지 않으며,
        대신 OBV(On-Balance Volume, 상승일 거래량은 더하고 하락일엔 빼는 누적 지표)로
        가격 움직임에 거래량이 실제로 뒷받침되는지("강")와 그렇지 않은지("약")만 참고용으로 표시합니다.
        OBV 역시 가격·거래량에서 파생된 지표라 한국 섹터의 실제 수급 데이터만큼의 독립적 근거는 아닙니다.
        <strong>테마별 대표 종목</strong>은 VanEck의 로보틱스(IBOT)·우주경제(WARP) ETF가 공개하는 최신 보유종목 비중 상위 10개를
        그대로 보여주는 정적 참고 자료입니다. 이 두 ETF는 지수를 그대로 추종하는 패시브 상품으로 반기(6월/12월 등)에만
        리밸런싱되며, "스마트머니 동향"과 달리 매수/매도 신호나 AI 분석이 적용되지 않습니다.
        <strong>신규 테마 ETF 출시 동향</strong>은 미국 자산운용사들의 새 ETF 출시/신청 뉴스를 모아 Claude가
        ETF명·운용사·테마를 구조화해 정리한 것입니다. 실제 신규 출시가 없으면 이 섹션 자체가 표시되지 않습니다.<br>
        <strong>차기싸이클 예측 판정 기준 (한국 섹터만 해당, 규칙 기반, AI 아님).</strong>
        <u>현재 싸이클</u> = 20일 모멘텀 +5%↑ 이고 자금흐름도 유입인 경우 (가격·수급이 이미 함께 상승) ·
        <u>차기 싸이클 가능성</u> = 자금흐름은 유입인데 20일 모멘텀은 아직 +2% 미만인 경우 (자금 유입이 가격에 아직 반영 전) ·
        <u>관찰 대상</u> = 정식 자금유입 조건(외국인 2일 이상 연속 매수 + 통계적 유의성)은 아직 못 채웠지만, 최근 5일 외국인 순매수 방향 자체는 매수 우위이고 가격도 상승 중인 경우 (아직 이르지만 지켜볼 신호) ·
        <u>“-”</u> = 위 조건에 해당하지 않는 경우.
        이 판정은 위 두 실데이터로 코드가 직접 계산하며, 뉴스요약·일정별 영향섹터만 Claude(Anthropic)가 생성한 추정치입니다.
        투자 자문이 아닌 리서치 참고 자료입니다. 매일 한국시간 08:00, 12:00, 16:00, 20:00에 자동 갱신됩니다.
      </div>
    `;

    startLiveIndicesPolling(); // 주요지수 가격은 이후 90초마다 별도로 계속 갱신
  } catch (err) {
    pill.classList.remove('ok'); pill.classList.add('err');
    document.getElementById('liveStatus').textContent = '연결 실패';
    container.innerHTML = `<div class="error">데이터를 불러오지 못했습니다.<br>${err.message}<br><br>GitHub Actions가 아직 성공적으로 실행되지 않았거나 data.json 경로를 확인해주세요.</div>`;
  } finally {
    if(isManualRefresh){
      refreshBtn.disabled = false;
      refreshBtn.innerHTML = '⟳ 화면 새로고침';
    }
  }
}

(function setupActionLink(){
  try {
    const host = location.hostname;
    const username = host.split('.')[0];
    const pathParts = location.pathname.split('/').filter(Boolean);
    const repo = pathParts[0];
    if(username && repo){
      document.getElementById('runActionBtn').href =
        `https://github.com/${username}/${repo}/actions/workflows/update.yml`;
    }
  } catch(e) { /* 주소 형식이 다르면 링크를 건드리지 않음 */ }
})();

// =========================================================
// 주요지수 실시간(5분 간격 백엔드 + 90초 간격 프론트) 가격 갱신
// -----------------------------------------------------------
// data.json(하루 4번 갱신, 뉴스/수급/AI분석 포함)과 별도로,
// indices_live.json(5분마다 갱신, 가격만)을 90초마다 조용히 다시
// 불러와서 이미 그려진 카드의 가격/등락률 부분만 갈아끼움.
// 전체를 다시 그리지 않기 때문에 열려있던 뉴스 드롭다운이나
// 스크롤 위치가 흐트러지지 않음.
// =========================================================
async function updateLiveIndices(){
  try {
    const res = await fetch('indices_live.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) return; // 아직 파일이 없거나 실패해도 조용히 넘어감 (기존 값 유지)
    const live = await res.json();
    const indices = live.indices || {};

    document.querySelectorAll('.index-card[data-index-name]').forEach(card => {
      const name = card.getAttribute('data-index-name');
      const info = indices[name];
      if(!info) return;

      const priceEl = card.querySelector('[data-live-price]');
      const chgEl = card.querySelector('[data-live-chg]');
      if(priceEl && info.price != null){
        priceEl.textContent = info.price.toLocaleString();
      }
      if(chgEl && info.pct_change != null){
        const cls = pctColorClass(info.pct_change);
        const arrow = (info.change ?? 0) >= 0 ? '▲' : '▼';
        chgEl.className = 'index-chg ' + cls;
        chgEl.textContent = `${arrow} ${Math.abs(info.change ?? 0).toFixed(2)} (${info.pct_change >= 0 ? '+' : ''}${info.pct_change}%)`;
      }
    });
  } catch(e) {
    // 네트워크 일시 오류 등은 조용히 무시하고 다음 주기(90초 뒤)에 재시도
  }
}

let liveIndicesTimer = null;
function startLiveIndicesPolling(){
  if(liveIndicesTimer) return; // 이미 폴링 중이면 중복 시작 방지 (수동 새로고침 시 등)
  updateLiveIndices(); // 최초 1회 즉시 실행
  liveIndicesTimer = setInterval(updateLiveIndices, 90000); // 이후 90초마다
}

loadDashboard();
</script>
